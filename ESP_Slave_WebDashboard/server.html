<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>LV Line Dashboard</title>
  <style>
    *{
      font-family: Helvetica, sans-serif;
    }
    body {
      margin: 0;
      font-family: Helvetica, sans-serif;
      background: #f4f4f4;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 200px;
      background: #222;
      color: #fff;
      padding-top: 20px;
    }

    .sidebar a {
      display: block;
      color: #ccc;
      padding: 12px;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: #575757;
      color: #fff;
    }

    .main {
      margin-left: 210px;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .status-active {
      color: green;
      font-weight: bold;
    }

    .status-inactive {
      color: red;
      font-weight: bold;
    }

    .map {
      position: relative;
      width: 100%;
      height: 400px;
      background: #e3e3e3 url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a3/Simple_world_map.svg/1024px-Simple_world_map.svg.png') no-repeat center;
      background-size: cover;
      border-radius: 10px;
    }

    .node-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #333;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <a href="#" onclick="showPage('status')">Status</a>
    <a href="#" onclick="showPage('map')">Map</a>
    <a href="#" onclick="showPage('nodes')">Nodes</a>
  </div>

  <div class="main">
    <div id="status" class="page">
      <h2>Node Status</h2>
      <div id="status-content"></div>
      <h3>Combined Network Status</h3>
      <div id="combined-status"></div>
    </div>

    <div id="map" class="page" style="display:none;">
      <h2>Network Map</h2>
      <div class="map" id="map-area">
        <div id="node1" class="node-dot" style="top:100px; left:200px;"></div>
        <div id="node2" class="node-dot" style="top:150px; left:400px;"></div>
        <div id="node3" class="node-dot" style="top:200px; left:600px;"></div>
      </div>
    </div>

    <div id="nodes" class="page" style="display:none;">
      <h2>Node Details</h2>
      <div id="nodes-content"></div>
    </div>
  </div>

  <script>
    let data = {};

    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      document.getElementById(page).style.display = 'block';
    }

    // Default page
    showPage('status');

    async function fetchData() {
      const res = await fetch('/data');
      data = await res.json();
      updateStatus();
      updateMap();
      updateNodes();
    }

    function updateStatus() {
      let html = '';
      let activeCount = 0;
      data.nodes.forEach(node => {
        const status = node.active ?
          '<span class="status-active">Active</span>' :
          '<span class="status-inactive">Inactive</span>';
        if (node.active) activeCount++;
        html += `<div class="card">
      <h3>${node.name}</h3>
      <p>Voltage: ${node.voltage.toFixed(1)} V</p>
      <p>Current: ${node.current.toFixed(2)} A</p>
      <p>Status: ${status}</p>
    </div>`;
      });
      document.getElementById('status-content').innerHTML = html;
      const overall = activeCount === data.nodes.length ?
        '<span class="status-active">All Nodes Active</span>' :
        '<span class="status-inactive">Fault Detected!</span>';
      document.getElementById('combined-status').innerHTML = overall;
    }

    function updateMap() {
      data.nodes.forEach((node, i) => {
        const dot = document.getElementById('node' + (i + 1));
        dot.style.background = node.active ? 'green' : 'red';
      });
    }

    function updateNodes() {
      let html = '<table border="1" cellpadding="8" style="border-collapse:collapse; background:#fff;">';
      html += '<tr><th>Node</th><th>Voltage (V)</th><th>Current (A)</th><th>Status</th></tr>';
      data.nodes.forEach(node => {
        html += `<tr>
      <td>${node.name}</td>
      <td>${node.voltage.toFixed(1)}</td>
      <td>${node.current.toFixed(2)}</td>
      <td style="color:${node.active ? 'green' : 'red'};">${node.active ? 'Active' : 'Inactive'}</td>
    </tr>`;
      });
      html += '</table>';
      document.getElementById('nodes-content').innerHTML = html;
    }

    setInterval(fetchData, 2000);
    fetchData();
  </script>
</body>
</html>
